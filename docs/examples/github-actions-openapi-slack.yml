name: OpenAPI Slack Report

# Project setup points:
# - Replace deploy-dev with your real backend deploy job, or attach openapi-change-report after it.
# - Change the branch condition on openapi-change-report if dev deploy does not run from develop.
# - For stg/prod, copy openapi-change-report and change dev names, paths, and secrets consistently.

on:
  workflow_dispatch:

jobs:
  # Replace this placeholder with the backend repository's real deploy job.
  deploy-dev:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy dev
        run: echo "replace with backend dev deploy"

  openapi-change-report:
    name: OpenAPI Change Report
    runs-on: ubuntu-latest
    needs: deploy-dev
    # Change this branch condition to match the backend repository's dev deploy branch.
    if: github.ref == 'refs/heads/develop' || github.event_name == 'workflow_dispatch'
    # Remove this line if the repository does not use GitHub Environments.
    environment: dev
    permissions:
      contents: write
      actions: read
    concurrency:
      group: openapi-change-report-dev
      cancel-in-progress: false

    steps:
      - name: Checkout backend repository
        uses: actions/checkout@v4

      - name: Prepare openapi-projector config
        run: |
          mkdir -p openapi/config
          if [ ! -f openapi/config/project.jsonc ]; then
            printf '{}\n' > openapi/config/project.jsonc
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check OpenAPI baseline branch
        id: baseline_branch
        run: |
          if git ls-remote --exit-code --heads origin openapi-baseline >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout OpenAPI baseline
        if: steps.baseline_branch.outputs.exists == 'true'
        uses: actions/checkout@v4
        with:
          ref: openapi-baseline
          path: baseline

      - name: Initialize OpenAPI baseline
        if: steps.baseline_branch.outputs.exists != 'true'
        run: |
          mkdir -p baseline
          git -C baseline init
          git -C baseline remote add origin "$(git config --get remote.origin.url)"
          if git config --local --get http.https://github.com/.extraheader >/dev/null; then
            git -C baseline config http.https://github.com/.extraheader "$(git config --local --get http.https://github.com/.extraheader)"
          fi
          git -C baseline checkout --orphan openapi-baseline

      - name: Restore previous catalog baseline
        run: |
          mkdir -p openapi/review/catalog
          if [ -f baseline/dev/endpoints.json ]; then
            cp baseline/dev/endpoints.json openapi/review/catalog/endpoints.json
          fi

      - name: Download deployed OpenAPI spec
        env:
          DEV_OAS_URL: ${{ secrets.DEV_OAS_URL }}
          OAS_AUTH_HEADER: ${{ secrets.OAS_AUTH_HEADER }}
        run: |
          if [ -z "$DEV_OAS_URL" ]; then
            echo "DEV_OAS_URL is required."
            exit 1
          fi

          case "$DEV_OAS_URL" in
            http://localhost*|https://localhost*|http://127.0.0.1*|https://127.0.0.1*)
              echo "DEV_OAS_URL must point to a deployed server, not localhost: $DEV_OAS_URL"
              exit 1
              ;;
          esac

          mkdir -p openapi/_internal/source

          for attempt in $(seq 1 20); do
            if [ -n "$OAS_AUTH_HEADER" ]; then
              curl -fsSL -H "$OAS_AUTH_HEADER" "$DEV_OAS_URL" -o openapi/_internal/source/openapi.json && exit 0
            else
              curl -fsSL "$DEV_OAS_URL" -o openapi/_internal/source/openapi.json && exit 0
            fi

            echo "Waiting for deployed OpenAPI spec... attempt=${attempt}"
            sleep 5
          done

          echo "Failed to download deployed OpenAPI spec"
          exit 1

      - name: Generate OpenAPI change report
        run: npx --yes openapi-projector@latest catalog

      - name: Detect OpenAPI changes
        id: changes
        run: |
          node <<'NODE' >> "$GITHUB_OUTPUT"
          const fs = require('node:fs');
          const changes = JSON.parse(fs.readFileSync('openapi/changes.json', 'utf8'));
          const added = changes.added.length;
          const removed = changes.removed.length;
          const contractChanged = changes.contractChanged.length;
          const docChanged = changes.docChanged.length;
          const count = added + removed + contractChanged + docChanged;
          const shouldNotify = changes.baseline !== true && count > 0;

          console.log(`changed=${shouldNotify}`);
          console.log(`summary=🆕 Added ${added} / 🗑️ Removed ${removed} / 🧩 Contract Changed ${contractChanged} / 📝 Doc Changed ${docChanged}`);
          NODE

      - name: Write OpenAPI report summary
        if: always()
        run: |
          if [ -f openapi/changes.md ]; then
            cat openapi/changes.md >> "$GITHUB_STEP_SUMMARY"
          fi

      # Keep Slack before baseline update so a failed notification does not silently advance the baseline.
      - name: Send Slack report
        if: steps.changes.outputs.changed == 'true'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          ACTIONS_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL is required when OpenAPI changes are detected."
            exit 1
          fi

          node <<'NODE'
          const fs = require('node:fs');

          const report = fs.readFileSync('openapi/changes.md', 'utf8').trim();
          const maxReportLength = 2500;
          const summaryText = process.env.ACTIONS_RUN_URL
            ? `<${process.env.ACTIONS_RUN_URL}|Actions summary>의 changes.md`
            : 'Actions summary의 changes.md';

          function trimReport(text) {
            if (text.length <= maxReportLength) {
              return text;
            }

            const paragraphCut = text.lastIndexOf('\n\n', maxReportLength);
            const lineCut = text.lastIndexOf('\n', maxReportLength);
            const cut = paragraphCut > 1000 ? paragraphCut : lineCut > 1000 ? lineCut : maxReportLength;

            return `${text.slice(0, cut).trim()}\n\n... (Slack 본문 길이 제한으로 일부만 표시됨)`;
          }

          const trimmedReport = trimReport(report);
          const payload = {
            text: `[DEV] OpenAPI 변경 감지\n\n${trimmedReport}\n\n전체 상세는 ${summaryText} 확인`,
          };

          fs.writeFileSync('slack-payload.json', JSON.stringify(payload));
          NODE

          curl -fsSL \
            -X POST \
            -H "Content-Type: application/json" \
            --data @slack-payload.json \
            "$SLACK_WEBHOOK_URL"

      - name: Update OpenAPI baseline
        run: |
          mkdir -p baseline/dev
          cp openapi/review/catalog/endpoints.json baseline/dev/endpoints.json

          cd baseline
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dev/endpoints.json
          git commit -m "chore(openapi): update dev baseline" || exit 0
          git push origin openapi-baseline
